name: medTrackPlus
description: "A new Flutter project."
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  shared_preferences: ^2.0.5
  google_fonts: ^6.2.1
  firebase_core: ^3.2.0
  cloud_firestore: ^5.1.0
  firebase_auth: ^5.1.2
  google_sign_in: ^6.2.1
  uuid: ^4.4.2
  flutter_blue_plus: ^1.2.1
  permission_handler: ^11.3.1
  alarm: ^5.2.1
  awesome_notifications: ^0.10.1
  firebase_database: ^11.1.0
  firebase_messaging: ^15.1.0
  easy_localization: ^3.0.8
  camera_android: ^0.10.9+16
  google_mlkit_face_detection: ^0.13.2
  google_mlkit_object_detection: ^0.15.1
  google_mlkit_image_labeling: ^0.14.0


  # Camera & Video
  camera: ^0.11.0+2
  video_compress: ^3.1.3
  video_player: ^2.9.2

  # State Management
  flutter_riverpod: ^2.6.1

  # Firebase Storage (video upload)
  firebase_storage: ^12.3.7
  path_provider: ^2.1.5

  # Date/time formatting (relative review screen)
  intl: ^0.20.2
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.13.1


  flutter_lints: ^5.0.0

flutter_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon/icon.png"

flutter:
  uses-material-design: true

  assets:
    - assets/
    - assets/languages/
    - assets/alarms/
    - assets/dispenser_icon.png
    - assets/pill_icon.png
